<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Listener - UC System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5; color: #1c1e21;
            height: 100vh;
            display: grid;
            grid-template-columns: 300px 1fr 320px;
            grid-template-rows: 100vh;
            gap: 0; overflow: hidden;
        }
        .col {
            display: flex; flex-direction: column;
            overflow-y: auto; padding: 20px; gap: 14px;
            border-right: 1px solid #dde1e7;
        }
        .col:last-child { border-right: none; }
        .col-left  { background: #ffffff; }
        .col-mid   { background: #0d1117; }
        .col-right { background: #ffffff; }
        .col-title {
            font-size: 1em; font-weight: 700;
            padding-bottom: 12px; border-bottom: 1px solid #dde1e7; flex-shrink: 0;
        }
        .col-mid .col-title   { color: #58a6ff; border-color: #30363d; }
        .col-left .col-title,
        .col-right .col-title { color: #0078d4; }
        .btn-connect {
            padding: 12px 16px; background: #0078d4; color: white;
            border: none; border-radius: 8px; cursor: pointer;
            font-weight: bold; width: 100%; font-size: 0.9em; transition: 0.2s;
        }
        .btn-connect:hover { background: #005a9e; }
        .stats-panel {
            padding: 12px; background: #f8f9fa;
            border-left: 4px solid #0078d4; border-radius: 6px;
            font-family: 'Courier New', monospace; font-size: 0.8em;
        }
        .volume-box {
            background: #f8f9fa; border-radius: 8px;
            padding: 12px; border: 1px solid #dde1e7;
        }
        .volume-box label {
            font-size: 0.82em; font-weight: 600; color: #6c757d;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 8px;
        }
        .volume-box input[type=range] { width: 100%; accent-color: #0078d4; cursor: pointer; }
        .btn-mute {
            width: 100%; margin-top: 8px; padding: 7px;
            border: none; border-radius: 6px; cursor: pointer;
            font-weight: bold; font-size: 0.82em;
            background: #0078d4; color: white; transition: 0.2s;
        }
        .btn-mute.muted { background: #da3633; }
        .btn-mute:hover { opacity: 0.85; }
        .video-wrapper {
            position: relative; background: #000;
            border-radius: 10px; overflow: hidden;
            border: 2px solid #30363d; flex: 1; min-height: 220px;
        }
        .video-wrapper video { width: 100%; height: 100%; object-fit: cover; display: none; }
        #videoOverlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: #8b949e; font-size: 0.85em; gap: 8px; background: #111;
        }
        #videoOverlay span { font-size: 2.8em; }
        .live-badge {
            position: absolute; top: 12px; left: 12px;
            background: #e03131; color: white; font-size: 0.7em;
            font-weight: bold; padding: 4px 10px; border-radius: 4px;
            letter-spacing: 1px; display: none;
        }
        .chat-messages {
            flex: 1; background: #f0f2f5; border-radius: 8px;
            padding: 12px; overflow-y: auto; font-size: 0.88em;
            border: 1px solid #dde1e7; min-height: 0;
        }
        .chat-input-row { display: flex; gap: 6px; flex-shrink: 0; }
        .chat-input-row input {
            flex: 1; padding: 9px 12px; border-radius: 6px;
            border: 1px solid #dde1e7; font-size: 0.88em; font-family: inherit;
        }
        .chat-input-row input:focus { outline: none; border-color: #0078d4; }
        .btn-send {
            padding: 9px 14px; background: #0078d4; color: white;
            border: none; border-radius: 6px; font-weight: bold;
            cursor: pointer; font-size: 0.82em; white-space: nowrap;
        }
        .btn-send:hover { background: #005a9e; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c9d1d9; border-radius: 3px; }
        .col-mid::-webkit-scrollbar-thumb { background: #30363d; }
    </style>
</head>
<body>

<!-- COLUMNA 1 — CONEXIÓN + AUDIO -->
<div class="col col-left">
    <div class="col-title">🎧 Sala de Recepción</div>

    <button id="startBtn" class="btn-connect">CONECTARSE AHORA</button>

    <div class="stats-panel">
        <div id="statusDisplay">📡 Estado: Esperando...</div>
        <div id="qosDisplay" style="margin-top:5px; color:#6c757d;">Latencia: -- ms</div>
    </div>

    <div class="volume-box">
        <label>
            🔊 Volumen audio en vivo
            <span id="volLabel">100%</span>
        </label>
        <input type="range" id="volSlider" min="0" max="100" value="100">
        <button id="btnMute" class="btn-mute">🔇 Silenciar</button>
    </div>

    <audio id="remoteAudio" playsinline style="display:none;"></audio>
</div>

<!-- COLUMNA 2 — VIDEO EN VIVO -->
<div class="col col-mid">
    <div class="col-title">📹 Video en Vivo</div>
    <div class="video-wrapper">
        <div id="videoOverlay">
            <span>📡</span>
            <div>Esperando transmisión de cámara...</div>
            <div style="font-size:0.78em; color:#484f58; margin-top:4px;">Se activará cuando el broadcaster encienda la cámara</div>
        </div>
        <video id="remoteVideo" playsinline></video>
        <div class="live-badge" id="liveBadge">● EN VIVO</div>
    </div>
</div>

<!-- COLUMNA 3 — CHAT -->
<div class="col col-right">
    <div class="col-title">💬 Chat Unificado</div>
    <div class="chat-messages" id="chatView">
        <div id="welcomeMessage" style="color:#8b949e; font-style:italic; font-size:0.88em;">Bienvenido al sistema telemático...</div>
    </div>
    <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="Escribir al broadcaster...">
        <button id="sendChatBtn" class="btn-send">ENVIAR</button>
    </div>
</div>

<script type="module" src="./listener.js"></script>
<script type="module" src="./listener-ui.js"></script>

<script>
    document.getElementById('remoteVideo').addEventListener('play', () => {
        document.getElementById('liveBadge').style.display = 'block';
    });

    const audio    = document.getElementById('remoteAudio');
    const slider   = document.getElementById('volSlider');
    const volLabel = document.getElementById('volLabel');
    const btnMute  = document.getElementById('btnMute');
    let volAntes   = 100;
    let silenciado = false;

    slider.addEventListener('input', () => {
        const v = parseInt(slider.value);
        audio.volume         = v / 100;
        volLabel.textContent = v + '%';
        silenciado           = v === 0;
        btnMute.textContent  = silenciado ? '🔊 Activar sonido' : '🔇 Silenciar';
        btnMute.classList.toggle('muted', silenciado);
    });

    btnMute.addEventListener('click', () => {
        silenciado = !silenciado;
        if (silenciado) {
            volAntes             = parseInt(slider.value) || 100;
            audio.volume         = 0;
            slider.value         = 0;
            volLabel.textContent = '0%';
            btnMute.textContent  = '🔊 Activar sonido';
            btnMute.classList.add('muted');
        } else {
            audio.volume         = volAntes / 100;
            slider.value         = volAntes;
            volLabel.textContent = volAntes + '%';
            btnMute.textContent  = '🔇 Silenciar';
            btnMute.classList.remove('muted');
        }
    });
</script>

</body>
</html>
